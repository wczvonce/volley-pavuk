name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: |
          for f in core1.js core2.js ocr.js; do node --check "$f"; done
      - name: Run tests
        run: node tests/run-all.js

  deploy:
    # Nasadenie sa nesmie vykonať, ak testy zlyhajú; PR sa nikdy nenasadzuje.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy site
        uses: actions/deploy-pages@v4
