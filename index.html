<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self' data: blob: https://cdn.jsdelivr.net https://tessdata.projectnaptha.com; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Pavúk – SVF Niké</title>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>
<div class="wrap">
<header>
<h1>🏐 Pavúk – <b id="myName">—</b> <span id="mySeed" class="seed-note"></span></h1>
<p>16 dvojíc. Dvojitá eliminácia po Final Four, potom semifinále, zápas o 3. miesto a jedno finále. Rozpis môžeš načítať z Excelu/PDF alebo vytvoriť zo screenshotu nasadenia.</p>
<div class="controls">
<label for="teamSel">Moja dvojica:</label>
<select id="teamSel"></select>
<button class="upload" id="uploadBtn">📄 Upload rozpisu</button>
<input id="fileInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/pdf" hidden>
</div>
<div id="msg" class="msg" role="status" aria-live="polite"></div>
</header>
<div id="view"></div>
</div>
<nav class="bar">
<button id="copyBtn" class="btn primary">Kopírovať vetvu</button>
<button id="undoBtn" class="btn" hidden>↩ Späť</button>
<button id="resetBtn" class="btn">Reset výsledkov</button>
</nav>
<script src="core1.js?v=7"></script>
<script src="core2.js?v=7"></script>
<script src="ocr.js?v=7"></script>
</body>
</html>
