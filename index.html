<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pavúk – SVF Niké</title>
<link rel="stylesheet" href="style.css?v=5">
<style>:root{--panel-hi:var(--hi)}</style>
</head>
<body>
<div class="wrap">
<header>
<h1>🏐 Pavúk – <b id="myName">—</b> <span id="mySeed" style="color:var(--muted);font-weight:400"></span></h1>
<p>16 dvojíc, dvojitá eliminácia. Rozpis môžeš načítať z Excelu/PDF alebo vytvoriť zo screenshotu nasadenia.</p>
<div class="controls">
<label for="teamSel">Moja dvojica:</label>
<select id="teamSel"></select>
<button class="upload" id="uploadBtn">📄 Upload rozpisu</button>
<input id="fileInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/pdf" hidden>
</div>
<div id="msg" class="msg"></div>
</header>
<div id="view"></div>
</div>
<nav class="bar">
<button id="copyBtn" class="btn primary">Kopírovať vetvu</button>
<button id="resetBtn" class="btn">Reset výsledkov</button>
</nav>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="core1.js?v=5"></script>
<script src="core2.js?v=5"></script>
<script src="ocr.js?v=5"></script>
<script>document.getElementById("seedImageInput")?.removeAttribute("capture")</script>
<script src="fixes.js?v=5"></script>
</body>
</html>
