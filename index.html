<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pavúk – SVF Niké</title>
<style>
:root{--bg:#0e1216;--panel:#161e27;--hi:#1e2935;--line:#283541;--ink:#e9eff4;--muted:#7a8a9c;--accent:#ffb02e;--win:#3ddc84;--lose:#566273;--tbd:#3b4856;--mono:ui-monospace,"SF Mono",Consolas,monospace}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-text-size-adjust:100%}.wrap{max-width:580px;margin:auto;padding:18px 14px 100px}h1{font-size:1.1rem;margin:0 0 4px}h1 b{color:var(--accent)}header p{margin:0;color:var(--muted);font-size:.88rem;line-height:1.45}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}.controls label{font-size:.8rem;color:var(--muted)}select,.upload{background:var(--hi);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:.84rem;font-weight:600}.upload{border-color:var(--accent);color:var(--accent);cursor:pointer}.msg{font-size:.76rem;line-height:1.4;min-height:1em;margin-top:7px}.msg.ok{color:var(--win)}.msg.err{color:#ff8a65}.track{margin:18px 0 24px}.track-title{font-size:1.05rem;font-weight:750;margin:0 0 10px}.track-scroll{display:flex;gap:14px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}.track-scroll::-webkit-scrollbar{height:6px}.track-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}.col{flex:0 0 188px;display:flex;flex-direction:column;scroll-snap-align:start}.col-head{font:600 .61rem/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding-bottom:6px;margin-bottom:8px;border-bottom:1px solid var(--line)}.col-stack{display:flex;flex-direction:column;justify-content:space-around;gap:10px;flex:1}.col.stagger .col-stack{gap:18px;padding-top:26px}.match{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:5px}.match.path{border-color:rgba(255,176,46,.55)}.match::after,.match::before{content:"";position:absolute;top:50%;height:1px;width:14px;background:var(--line)}.col:not(:last-child) .match::after{right:-14px}.col:not(:first-child) .match::before{left:-14px}.mid{position:absolute;right:8px;top:5px;font:600 .53rem/1 var(--mono);color:var(--muted)}.auto{position:absolute;right:7px;bottom:5px;font:600 .48rem/1 var(--mono);color:var(--win)}.slot{display:flex;align-items:center;gap:7px;width:100%;border:1.5px solid transparent;border-radius:8px;background:var(--hi);color:var(--ink);padding:7px 8px;margin:2px 0;text-align:left;font-size:.83rem;line-height:1.15;cursor:pointer}.slot:disabled{cursor:default}.seed{font:600 .55rem/1 var(--mono);color:var(--muted);min-width:28px}.name{flex:1;font-weight:600}.slot.win{border-color:var(--win);background:rgba(61,220,132,.10)}.slot.win .seed{color:var(--win)}.slot.lose{opacity:.4}.slot.lose .name{text-decoration:line-through;text-decoration-color:var(--lose)}.slot.tbd{color:var(--tbd)}.slot.tbd .name{font-style:italic}.slot.target .name,.slot.target .seed{color:var(--accent)}.check{width:16px;height:16px;opacity:0;color:var(--win);flex:none}.slot.win .check{opacity:1}.bar{position:fixed;left:0;right:0;bottom:0;max-width:580px;margin:auto;display:flex;gap:9px;padding:11px 14px calc(11px + env(safe-area-inset-bottom));background:rgba(14,18,22,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line)}.btn{flex:1;border:1px solid var(--line);border-radius:12px;background:var(--hi);color:var(--ink);padding:13px;font-size:.9rem;font-weight:700}.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1205}.btn.ok{background:var(--win);border-color:var(--win);color:#052312}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>🏐 Pavúk – <b id="myName">—</b> <span id="mySeed" style="color:var(--muted);font-weight:400"></span></h1>
<p>16 dvojíc, dvojitá eliminácia. Po nahratí Excelu sa načítajú mená aj presné prepojenia W/L/BYE.</p>
<div class="controls"><label for="teamSel">Moja dvojica:</label><select id="teamSel"></select><button class="upload" id="uploadBtn">📄 Načítať PDF / Excel</button><input id="fileInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/pdf" hidden></div>
<div id="msg" class="msg"></div>
</header>
<div id="view"></div>
</div>
<nav class="bar"><button id="copyBtn" class="btn primary">Kopírovať vetvu</button><button id="resetBtn" class="btn">Reset výsledkov</button></nav>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
"use strict";
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.worker.min.js";

const BYE="BYE";
const TEAMS={S1:"Povrazník / Petro",S2:"Petráš / Neštický",S3:"Michalovič / Patúc",S4:"Pavlinský / Jarošík (CZE)",S5:"Gréč / Žák",S6:"Janto / Žiaček",S7:"Naňo / Regina",S8:"Ondrušek / Matušovský",S9:"Purdeš / Zavacký",S10:"Brilla L. / Velička",S11:"Šebök / Blažo",S12:"Holienka / Kúdelčík",S13:"Nataniel - Hajzuš / Červenák L.",S14:"Sekera / Sekera ml.",S15:"Mazák / Križák",S16:"S16"};
let M={
1:{A:"S1",B:BYE},2:{A:"S9",B:"S8"},3:{A:"S5",B:"S12"},4:{A:"S13",B:"S4"},5:{A:"S3",B:"S14"},6:{A:"S11",B:"S6"},7:{A:"S7",B:"S10"},8:{A:"S15",B:"S2"},
9:{A:{W:1},B:{W:2}},10:{A:{W:3},B:{W:4}},11:{A:{W:5},B:{W:6}},12:{A:{W:7},B:{W:8}},
13:{A:BYE,B:{L:2}},14:{A:{L:3},B:{L:4}},15:{A:{L:5},B:{L:6}},16:{A:{L:7},B:{L:8}},
17:{A:{W:13},B:{L:12}},18:{A:{W:14},B:{L:11}},19:{A:{W:15},B:{L:10}},20:{A:{W:16},B:{L:9}},
21:{A:{W:9},B:{W:10}},22:{A:{W:11},B:{W:12}},23:{A:{W:17},B:{W:18}},24:{A:{W:19},B:{W:20}},
25:{A:{W:24},B:{L:22}},26:{A:{W:23},B:{L:21}},27:{A:{W:21},B:{W:25}},28:{A:{W:22},B:{W:26}},29:{A:{L:27},B:{L:28}},30:{A:{W:27},B:{W:28}}
};
const TRACKS=[
{title:"Hlavný pavúk",cols:[{name:"1. kolo",ids:[1,2,3,4,5,6,7,8]},{name:"2. kolo",ids:[9,10,11,12]},{name:"3. kolo",ids:[21,22]}]},
{title:"Baziny (losers)",cols:[{name:"Prehra 13–16",ids:[16,15,14,13]},{name:"Prehra 9–12",ids:[20,19,18,17]},{name:"Prehra 7–8",ids:[24,23]},{name:"Prehra 5–6",ids:[25,26]}]},
{title:"Záver",cols:[{name:"Semifinále",ids:[27,28]},{name:"O 3. miesto",ids:[29]},{name:"Finále",ids:[30]}]}
];
let WIN={};
let MY_SEED=(()=>{try{return localStorage.getItem("pavuk_my_seed")||"S1"}catch{return "S1"}})();
const $=id=>document.getElementById(id), label=s=>s===BYE?"BYE":(TEAMS[s]||s||"—");

function resolveSlot(slot,seen=new Set()){
 if(typeof slot==="string") return slot;
 const ref=slot&&(+slot.W||+slot.L); if(!ref) return null;
 const st=matchState(ref,seen); return slot.W?st.w:st.l;
}
function matchState(id,seen=new Set()){
 if(!M[id]||seen.has(id)) return {a:null,b:null,w:null,l:null,auto:false};
 const next=new Set(seen); next.add(id);
 const a=resolveSlot(M[id].A,next),b=resolveSlot(M[id].B,next);
 let w=null,auto=false;
 if(a&&b){
  if(a===BYE&&b!==BYE){w=b;auto=true}
  else if(b===BYE&&a!==BYE){w=a;auto=true}
  else if(WIN[id]===a||WIN[id]===b) w=WIN[id];
 }
 return {a,b,w,l:w?(a===w?b:a):null,auto};
}
function prune(){let changed=true;while(changed){changed=false;for(const k of Object.keys(WIN)){const id=+k,st=matchState(id);if(!st.a||!st.b||st.a===BYE||st.b===BYE||(WIN[id]!==st.a&&WIN[id]!==st.b)){delete WIN[id];changed=true}}}}
function setWinner(id,seed){const st=matchState(id);if(!seed||seed===BYE||st.auto||!(seed===st.a||seed===st.b))return;if(WIN[id]===seed)delete WIN[id];else WIN[id]=seed;prune();render()}
function targetPath(){const out=[];for(let id=1;id<=30;id++){const st=matchState(id);if(st.a===MY_SEED||st.b===MY_SEED)out.push(id)}return out}
function activeSeeds(){const s=new Set();for(const m of Object.values(M))for(const x of [m.A,m.B])if(typeof x==="string"&&/^S\d+$/.test(x))s.add(x);return [...s].sort((a,b)=>+a.slice(1)-+b.slice(1))}
function sourceHint(slot){if(typeof slot==="string")return slot===BYE?"voľný žreb":label(slot);if(slot.W)return `víťaz Z${slot.W}`;if(slot.L)return `porazený Z${slot.L}`;return "čaká sa"}
function slotButton(id,which,st){const slot=M[id][which],seed=which==="A"?st.a:st.b,b=document.createElement("button");b.className="slot";if(!seed){b.classList.add("tbd");b.disabled=true;b.innerHTML=`<span class="seed">—</span><span class="name">${sourceHint(slot)}</span>`;return b}b.innerHTML=`<span class="seed">${seed===BYE?"—":seed}</span><span class="name">${label(seed)}</span><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`;if(seed===MY_SEED)b.classList.add("target");if(st.w===seed)b.classList.add("win");else if(st.w)b.classList.add("lose");if(seed===BYE||st.auto)b.disabled=true;else b.onclick=()=>setWinner(id,seed);return b}
function matchEl(id,path){const st=matchState(id),d=document.createElement("div");d.className="match"+(path.has(id)?" path":"");d.innerHTML=`<span class="mid">Z${id}</span>${st.auto?'<span class="auto">AUTO</span>':''}`;d.append(slotButton(id,"A",st),slotButton(id,"B",st));return d}
function render(){const path=new Set(targetPath()),v=$("view");v.innerHTML="";for(const tr of TRACKS){const t=document.createElement("section");t.className="track";t.innerHTML=`<div class="track-title">${tr.title}</div>`;const sc=document.createElement("div");sc.className="track-scroll";tr.cols.forEach((col,i)=>{const c=document.createElement("div");c.className="col"+(i?" stagger":"");c.innerHTML=`<div class="col-head">${col.name}</div>`;const stack=document.createElement("div");stack.className="col-stack";col.ids.forEach(id=>stack.append(matchEl(id,path)));c.append(stack);sc.append(c)});t.append(sc);v.append(t)}buildSelect()}
function buildSelect(){const sel=$("teamSel"),seeds=activeSeeds();if(!seeds.includes(MY_SEED))MY_SEED=seeds[0]||"S1";sel.innerHTML="";for(const s of seeds){const o=document.createElement("option");o.value=s;o.textContent=`${s} — ${label(s)}`;o.selected=s===MY_SEED;sel.append(o)}sel.onchange=()=>{MY_SEED=sel.value;try{localStorage.setItem("pavuk_my_seed",MY_SEED)}catch{}updateTitle();render()};updateTitle()}
function updateTitle(){$("myName").textContent=label(MY_SEED);$("mySeed").textContent=`(${MY_SEED})`}
function branchText(){const ids=targetPath(),out=[`Vetva — ${label(MY_SEED)} (${MY_SEED})`,""];for(const id of ids){const st=matchState(id),opp=st.a===MY_SEED?st.b:st.a,tag=st.w?(st.w===MY_SEED?"[výhra]":"[prehra]"):"[hrá]";out.push(`${tag} Z${id}: proti ${opp?label(opp):"zatiaľ neurčenému súperovi"}`)}const losses=ids.filter(id=>{const w=matchState(id).w;return w&&w!==MY_SEED});if(matchState(30).w===MY_SEED)out.push("","→ VÍŤAZ TURNAJA 🏆");else if(losses.length>=2)out.push("","→ VYRADENÝ PO 2. PREHRE");return out.join("\n")}

function parseSlotText(value){const s=String(value??"").replace(/\s+/g," ").trim();if(!s)return null;if(/^BYE$/i.test(s)||/voľn[ýy]\s+žreb/i.test(s))return BYE;let m=s.match(/^W\s*(\d{1,2})$/i);if(m)return{W:+m[1]};m=s.match(/^L\s*(\d{1,2})$/i);if(m)return{L:+m[1]};m=s.match(/\(S(1[0-6]|[1-9])\)/i)||s.match(/^S(1[0-6]|[1-9])$/i);if(m)return"S"+(m[1]||m[0].replace(/\D/g,""));return null}
function teamFromText(value){const s=String(value??"").replace(/\s+/g," ").trim(),m=s.match(/\(S(1[0-6]|[1-9])\)/i);if(!m)return null;const seed="S"+m[1],name=s.replace(/\s*\(S\d+\)\s*$/i,"").trim();return name?{seed,name}:null}
function scoreSide(value){const m=String(value??"").match(/\b([0-2])\s*:\s*([0-2])\b/);if(!m||m[1]===m[2])return null;return +m[1]>+m[2]?"A":"B"}
function validateModel(model){for(let id=1;id<=30;id++){const m=model[id];if(!m||!m.A||!m.B)return false;for(const s of [m.A,m.B])if(typeof s==="object"){const r=+(s.W||s.L);if(!r||r>=id)return false}}return true}
function applyParsed(res){if(res.model&&validateModel(res.model))M=res.model;WIN={};for(const t of res.teams||[])if(t.name&&t.seed)TEAMS[t.seed]=t.name;for(const r of (res.rows||[]).sort((a,b)=>a.num-b.num)){if(!r.winnerSide)continue;const st=matchState(r.num),w=r.winnerSide==="A"?st.a:st.b;if(w&&w!==BYE)WIN[r.num]=w}prune();buildSelect();render()}
function parseExcelDraw(ws){const grid=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""}),rows=[],model={},teams=[];let hdr=-1,numCol=0,aCol=5,bCol=7,resCol=8;for(let i=0;i<grid.length;i++){const r=grid[i].map(x=>String(x).trim());if(r.some(x=>/^Tím\s*1$/i.test(x))&&r.some(x=>/^Tím\s*2$/i.test(x))){hdr=i;numCol=r.findIndex(x=>/^Č\.?$/i.test(x));aCol=r.findIndex(x=>/^Tím\s*1$/i.test(x));bCol=r.findIndex(x=>/^Tím\s*2$/i.test(x));resCol=r.findIndex(x=>/^Výsledok$/i.test(x));break}}if(hdr<0)hdr=4;for(let i=hdr+1;i<grid.length;i++){const r=grid[i],num=+r[numCol];if(num<1||num>30)continue;const A=parseSlotText(r[aCol]),B=parseSlotText(r[bCol]);if(A&&B)model[num]={A,B};const ta=teamFromText(r[aCol]),tb=teamFromText(r[bCol]);if(ta)teams.push(ta);if(tb)teams.push(tb);rows.push({num,winnerSide:scoreSide(r[resCol])})}return{rows,model:Object.keys(model).length===30?model:null,teams}}
function parseSeeding(ws){const grid=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""}),teams=[];for(const row of grid){let si=-1,seed=null;for(let i=row.length-1;i>=0;i--){const m=String(row[i]).trim().match(/^S(1[0-6]|[1-9])$/i);if(m){si=i;seed="S"+m[1];break}}if(si<0)continue;let found=null;for(let i=si-1;i>=0;i--){const c=String(row[i]).replace(/\s+/g," ").trim();if(!c)continue;const m=c.match(/\(S(1[0-6]|[1-9])\)\s*$/i);if(m&&"S"+m[1]===seed){const name=c.replace(/\s*\(S\d+\)\s*$/i,"").trim();if(name)found={seed,name};break}}if(found)teams.push(found)}return teams}
function parsePdfText(text){const rows=[],model={},teams=[];for(const line of text.split(/\n+/)){const h=line.match(/^\s*(\d{1,2})\b/);if(!h||!/(?<!\w)vs(?!\w)/i.test(line))continue;const num=+h[1];if(num<1||num>30)continue;const p=line.split(/\s+vs\s+/i),A=parseSlotText(p[0]),B=parseSlotText(p[1]);if(A&&B)model[num]={A,B};const ta=teamFromText(p[0]),tb=teamFromText(p[1]);if(ta)teams.push(ta);if(tb)teams.push(tb);rows.push({num,winnerSide:scoreSide(p[1])})}return{rows,model:Object.keys(model).length===30?model:null,teams}}

async function handleExcel(file){if(!window.XLSX)throw Error("Knižnica XLSX sa nenačítala");const wb=XLSX.read(await file.arrayBuffer(),{type:"array"}),drawName=wb.SheetNames.find(n=>/main\s*draw|draw|zápas|rozpis/i.test(n)),seedName=wb.SheetNames.find(n=>/nasaden|seeding/i.test(n));if(!drawName)throw Error("Nenašiel som hárok Main Draw");const res=parseExcelDraw(wb.Sheets[drawName]);if(seedName)res.teams.push(...parseSeeding(wb.Sheets[seedName]));if(!res.model)throw Error("Nenačítalo sa všetkých 30 zápasov");applyParsed(res);showMsg(`Excel načítaný: 30 zápasov, ${new Set(res.teams.map(x=>x.seed)).size} dvojíc. BYE a všetky W/L prepojenia sú aktívne.`,"ok")}
async function handlePdf(file){const lib=window.pdfjsLib;if(!lib)throw Error("Knižnica PDF sa nenačítala");const pdf=await lib.getDocument({data:await file.arrayBuffer()}).promise;let text="";for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p),tc=await page.getTextContent(),items=tc.items.map(x=>({x:x.transform[4],y:x.transform[5],s:x.str})).sort((a,b)=>b.y-a.y||a.x-b.x),lines=[];for(const it of items){let l=lines.find(x=>Math.abs(x.y-it.y)<=3.5);if(!l){l={y:it.y,a:[]};lines.push(l)}l.a.push(it)}for(const l of lines)text+=l.a.sort((a,b)=>a.x-b.x).map(x=>x.s).join(" ")+"\n"}const res=parsePdfText(text);if(!res.model)throw Error("Z PDF sa nepodarilo načítať všetkých 30 prepojení");applyParsed(res);showMsg("PDF načítané: 30 zápasov a presné prepojenia.","ok")}
function showMsg(t,c=""){$("msg").textContent=t;$("msg").className="msg "+c}
$("uploadBtn").onclick=()=>$("fileInput").click();$("fileInput").onchange=async e=>{const f=e.target.files[0];if(!f)return;showMsg("Načítavam…");try{if(/\.xlsx$/i.test(f.name)||/spreadsheet/.test(f.type))await handleExcel(f);else await handlePdf(f)}catch(err){console.error(err);showMsg("Chyba: "+err.message,"err")}finally{e.target.value=""}};
$("resetBtn").onclick=()=>{WIN={};render();showMsg("Výsledky boli vymazané. Prepojenia a mená ostali.","ok")};
$("copyBtn").onclick=async()=>{const t=branchText();try{await navigator.clipboard.writeText(t)}catch{const x=document.createElement("textarea");x.value=t;document.body.append(x);x.select();document.execCommand("copy");x.remove()}const b=$("copyBtn"),o=b.textContent;b.textContent="Skopírované ✓";b.classList.add("ok");setTimeout(()=>{b.textContent=o;b.classList.remove("ok")},1200)};
buildSelect();render();
</script>
</body>
</html>
